<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV M Dhimas Hafizh F</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container shadow">
        <header class="cv-header">
            <div class="photo-container">
                <img src="asset/foto.png" alt="Foto Profil" class="profile-img">
            </div>
            <div class="header-info">
                <h1 id="cv-name">Loading...</h1>
                <div class="divider"></div>
                <div class="contact-grid" id="contact-info">Loading contact info...</div>
            </div>
        </header>

        <section class="profile-section">
            <h3><strong>Profil</strong></h3>
            <p id="cv-summary">Loading profile...</p>
        </section>

        <div class="main-content">
            <div class="left-column">
                <section>
                    <h3><strong>Pendidikan</strong></h3>
                    <div id="education-list">Loading education...</div>
                </section>
                <section>
                    <h3><strong>Pengalaman Kerja</strong></h3>
                    <div id="experience-list">Loading work experience...</div>
                </section>
                <section class="skills-section">
                    <h3><strong>Skill</strong></h3>
                    <ul id="skills-list" class="custom-list">Loading skill...</ul>
                </section>
            </div>

            <div class="right-column">
                <section>
                    <h3><strong>Pengalaman Organisasi</strong></h3>
                    <div id="organization-list">Loading organization experience...</div>
                </section>
            </div>
        </div>

        <div class="footer-bar"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
